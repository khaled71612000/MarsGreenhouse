+FunFacts=The UAE's Hope probe (Al-Amal) reached Mars orbit in 2021 - the Arab world's first interplanetary mission.
+FunFacts=Mars receives only ~43% of Earth's sunlight, so Martian greenhouses lean hard on LED grow-lights.
+FunFacts=Purple 'blurple' grow-lights mix red and blue - the efficient spectrum plants use most for photosynthesis.
+FunFacts=A Martian sol is 24 hours 39 minutes - just a little longer than an Earth day.
+FunFacts=Mars soil holds perchlorates that are toxic to humans, so crops grow in treated or hydroponic beds.
+FunFacts=NASA studied potatoes for space farming: dense calories per square meter of greenhouse.
+FunFacts=The Martian atmosphere is ~95% CO2 - great for photosynthesis, useless for breathing.
+FunFacts=Water on Mars is locked in subsurface ice; extracting it costs precious energy.
+FunFacts=Electrolysis splits water into breathable oxygen and hydrogen fuel.
+FunFacts=Global dust storms can blanket Mars for weeks - much like the dust storms of Earth's deserts, but planet-wide.
+FunFacts=Lettuce grows fast and freshens the air - a favorite crop aboard the ISS.
+FunFacts=A sealed greenhouse recycles nearly all its water through plant transpiration and condensation.
Objective=Keep Bustan's life support stable and grow enough food to survive 15 sols.
